name: ${COMPOSE_PROJECT_NAME:-intelvia}

services:
  backend:
    image: docker.io/intelvia/intelvia-backend:${INTELVIA_IMAGE_TAG:?INTELVIA_IMAGE_TAG is required}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PARQUET_CACHE_DIR: /app/parquet_cache
      RUN_STARTUP_MIGRATIONS: "true"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/parquet_cache:/app/parquet_cache:z

  celery-worker:
    image: docker.io/intelvia/intelvia-backend:${INTELVIA_IMAGE_TAG:?INTELVIA_IMAGE_TAG is required}
    env_file:
      - .env
    entrypoint: []
    command: >
      poetry run celery -A api worker
      --loglevel=${CELERY_WORKER_LOG_LEVEL:-info}
      --concurrency=${CELERY_WORKER_CONCURRENCY:-1}
      --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/parquet_cache:/app/parquet_cache:z

  celery-beat:
    image: docker.io/intelvia/intelvia-backend:${INTELVIA_IMAGE_TAG:?INTELVIA_IMAGE_TAG is required}
    env_file:
      - .env
    entrypoint: []
    command: poetry run celery -A api beat --loglevel=${CELERY_BEAT_LOG_LEVEL:-info}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  mariadb:
    image: docker.io/mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/conf.d:/etc/mysql/conf.d:ro,z
    healthcheck:
      test: ["CMD-SHELL", "mariadb --protocol=socket --socket=/run/mysqld/mysqld.sock -uroot --password=\"$${MARIADB_ROOT_PASSWORD}\" -e 'SELECT 1' >/dev/null 2>&1"]
      start_period: 3s
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: docker.io/intelvia/intelvia-frontend:${INTELVIA_IMAGE_TAG:?INTELVIA_IMAGE_TAG is required}
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: backend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  mariadb_data:
  redis_data:
